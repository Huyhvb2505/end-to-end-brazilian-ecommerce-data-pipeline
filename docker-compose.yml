services:
  # --- SPARK MASTER ---
  spark-master:
    image: ${SPARK_IMAGE}
    container_name: spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - SPARK_MASTER_WEBUI_PORT=8080
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./notebooks:/opt/spark-notebooks
    networks:
      - spark-network

  # --- SPARK WORKER 1 ---
  spark-worker-1:
    image: ${SPARK_IMAGE}
    container_name: spark-worker-1
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_CORES=${SPARK_WORKER_CORES}
      - SPARK_WORKER_MEMORY=${SPARK_WORKER_MEMORY}
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    ports:
      - "8081:8081"
    volumes:
      - ./notebooks:/opt/spark-notebooks
    networks:
      - spark-network
    depends_on:
      - spark-master

  # --- SPARK WORKER 2 ---
  spark-worker-2:
    image: ${SPARK_IMAGE}
    container_name: spark-worker-2
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_CORES=${SPARK_WORKER_CORES}
      - SPARK_WORKER_MEMORY=${SPARK_WORKER_MEMORY}
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    ports:
      - "8082:8082"
    volumes:
      - ./notebooks:/opt/spark-notebooks
    networks:
      - spark-network
    depends_on:
      - spark-master

  # --- MINIO OBJECT STORAGE ---
  minio:
    image: minio/minio:RELEASE.2024-01-28T22-35-53Z
    container_name: minio
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - spark-network

  # --- MINIO CLIENT (Tự động hóa tạo Bucket) ---
  minio-client:
    image: minio/mc:latest
    container_name: minio-client
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}) do echo 'Waiting for MinIO...' && sleep 1; done;
      /usr/bin/mc mb myminio/${BUCKET_RAW} || true;
      /usr/bin/mc mb myminio/${BUCKET_PROCESSED} || true;
      /usr/bin/mc mb myminio/${BUCKET_MODELS} || true;
      exit 0;
      "
    networks:
      - spark-network

  # --- POSTGRES DATA WAREHOUSE ---
  postgres-dw:
    image: postgres:16-alpine
    container_name: postgres-dw
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - spark-network

  # --- JUPYTER LAB (MÔI TRƯỜNG DEV) ---
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile.jupyter
    container_name: jupyter-lab
    ports:
      - "${JUPYTER_PORT}:8888"
    environment:
      - JUPYTER_TOKEN=${JUPYTER_TOKEN}
    volumes:
      - ./notebooks:/home/jovyan/work/notebooks
      - ./raw:/home/jovyan/work/raw
      - ./scripts:/home/jovyan/work/scripts
    networks:
      - spark-network
    depends_on:
      - spark-master
      - minio
      - postgres-dw

networks:
  spark-network:
    driver: bridge

volumes:
  minio_data:
  postgres_data: