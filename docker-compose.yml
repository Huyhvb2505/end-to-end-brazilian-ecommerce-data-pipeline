version: '3.'
# TODO: add spark, postgres, minio services

services:
  spark-master:
    image: bitnamilegacy/spark:3.5.0-debian-12-r18
    container_name: spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - SPARK_MASTER_WEBUI_PORT=8080
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - .data:/opt/spark/data
      - ./notebooks:/opt/spark-notebooks
    networks:
      - spark-network

  #spark-worker1
  spark-worker-1:
    image: bitnamilegacy/spark:3.5.0-debian-12-r18
    container_name: spark-worker-1
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    ports:
      - "8081:8081" # Worker Web UI
    volumes:
      - .data:/opt/spark/data
      - ./notebooks:/opt/spark-notebooks
    depends_on:
      - spark-master
    networks:
      - spark-network


  #spark-worker2
  spark-worker-2:
    image: bitnamilegacy/spark:3.5.0-debian-12-r18
    container_name: spark-worker-2
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    ports:
      - "8082:8082" # Worker Web UI
    volumes:
      - .data:/opt/spark/data
      - ./notebooks:/opt/spark-notebooks
    depends_on:
      - spark-master
    networks:
      - spark-network

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      - POSTGRES_USER=spark_user
      - POSTGRES_PASSWORD=spark_password
      - POSTGRES_DB=ecommerce_analytics
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql/init_postgres.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - spark-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spark_user"]
      interval: 10s
      timeout: 5s
      retries: 5
